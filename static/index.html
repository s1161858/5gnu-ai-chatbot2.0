<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5GNU 专属智能 Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <!-- 顶部 Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">5GNU</span>
      </div>
      <div class="header-divider"></div>
      <div class="header-title">
        <span class="title-main">专属智能 Agent</span>
        <span class="title-sub">5G新媒体 · 低空智联</span>
      </div>
    </div>
    <div class="header-right">
      <span class="status-dot"></span>
      <span class="status-text">在线服务中</span>
    </div>
  </header>

  <!-- 聊天记录区 -->
  <main class="chat-container" id="chatContainer"></main>

  <!-- 底部输入区 -->
  <footer class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        class="input-box"
        placeholder="请输入您的问题...（Enter 发送，Shift+Enter 换行）"
        rows="1"
      ></textarea>
      <!-- 新增的清空按钮 -->
      <button class="clear-btn" id="clearBtn" title="清空对话">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 6H5H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 6V20C19 21.1046 18.1046 22 17 22H7C5.89543 22 5 21.1046 5 20V6M8 6V4C8 2.89543 8.89543 2 10 2H14C15.1046 2 16 2.89543 16 4V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      
      <!-- 原来的发送按钮 -->
      <button class="send-btn" id="sendBtn" title="发送">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">由 DeepSeek AI · 5GNU 知识库 驱动</p>
  </footer>

  <script src="/static/script.js"></script>
</body>
</html>
